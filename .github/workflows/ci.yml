name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AIOps Agent
        run: python src/main.py

      - name: Verify CSV log was created
        run: |
          if [ -f data/metrics_log.csv ]; then
            echo "✅ metrics_log.csv created successfully"
            head -5 data/metrics_log.csv
          else
            echo "❌ metrics_log.csv not found"
            exit 1
          fi
